<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>PGS 2.0 — Publicity Global System</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#07050f;--surface:#110d22;--surface2:#1a1535;--border:rgba(255,255,255,.08);--gold:#F5C842;--text:#e4e0f0;--muted:#8884a8;
 --green:#22c55e;--red:#ef4444;--amber:#f59e0b;--blue:#3b82f6;--purple:#a78bfa;--sidebar-w:212px;--topbar-h:56px;}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:13px}
button{font-family:inherit}
.topbar{position:fixed;top:0;left:0;right:0;height:var(--topbar-h);background:rgba(7,5,15,.96);border-bottom:1px solid var(--border);display:flex;align-items:center;z-index:100;backdrop-filter:blur(12px)}
.tb-logo{width:var(--sidebar-w);display:flex;align-items:center;gap:9px;padding:0 18px;flex-shrink:0}
.badge{background:var(--gold);color:#000;font-weight:900;font-size:11px;padding:3px 7px;border-radius:4px;letter-spacing:.5px}
.lname{font-size:13px;font-weight:700}.lbeta{font-size:9px;color:var(--gold);font-weight:700;background:rgba(245,200,66,.12);padding:1px 5px;border-radius:10px;border:1px solid rgba(245,200,66,.3)}
.tb-c{flex:1;font-size:13px;color:var(--muted);padding:0 20px}
.tb-r{display:flex;align-items:center;gap:8px;padding:0 18px}
.tbtn{background:var(--gold);color:#000;border:none;font-weight:700;font-size:11px;padding:7px 13px;border-radius:7px;cursor:pointer}
.tbtn.ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}.tbtn.ghost:hover{border-color:var(--gold);color:var(--gold)}
.snap{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);border:1px solid var(--border);padding:5px 10px;border-radius:6px}
.snap .d{width:7px;height:7px;border-radius:50%;background:var(--amber);box-shadow:0 0 6px var(--amber)}
.sidebar{position:fixed;top:var(--topbar-h);left:0;bottom:0;width:var(--sidebar-w);background:rgba(10,7,22,.8);border-right:1px solid var(--border);overflow-y:auto;z-index:90;padding-top:8px}
.sec{padding:14px 14px 4px;font-size:9px;font-weight:800;letter-spacing:1.2px;color:var(--muted);text-transform:uppercase}
.nav{display:flex;align-items:center;gap:10px;padding:9px 14px;margin:1px 8px;border-radius:8px;cursor:pointer;color:var(--muted);font-size:12px;font-weight:500}
.nav:hover{background:rgba(255,255,255,.05);color:var(--text)} .nav.active{background:rgba(245,200,66,.1);color:var(--gold)}
.nav .ic{width:16px;text-align:center;opacity:.7}.nav .bd{margin-left:auto;background:rgba(245,200,66,.18);color:var(--gold);font-size:9px;font-weight:800;padding:1px 6px;border-radius:10px}
.nav .bd.red{background:rgba(239,68,68,.2);color:var(--red)}
.main{position:fixed;top:var(--topbar-h);left:var(--sidebar-w);right:0;bottom:0;overflow-y:auto;padding:22px 26px 60px}
.ph{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.ph h1{font-size:20px;font-weight:800}.ph .s{font-size:12px;color:var(--muted);margin-top:3px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(132px,1fr));gap:12px;margin-bottom:8px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 15px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gold)}
.kpi.k-red::before{background:var(--red)}.kpi.k-blue::before{background:var(--blue)}.kpi.k-green::before{background:var(--green)}.kpi.k-purple::before{background:var(--purple)}
.kpi .n{font-size:27px;font-weight:900;line-height:1}.kpi .l{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-top:5px}
h2{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin:26px 0 12px;display:flex;align-items:center;gap:8px}
h2 .tag{background:rgba(245,200,66,.16);color:var(--gold);font-size:9px;font-weight:800;padding:2px 8px;border-radius:10px;letter-spacing:.4px}
.tw{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{padding:9px 14px;text-align:left;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);background:var(--surface2);white-space:nowrap}
tbody tr{border-top:1px solid var(--border)}tbody tr:hover{background:rgba(255,255,255,.03)}
td{padding:9px 14px;font-size:12px;vertical-align:middle}
.tt{font-weight:600}.sub{font-size:11px;color:var(--muted)}
.bg{display:inline-block;padding:3px 9px;border-radius:10px;font-size:10px;font-weight:700;white-space:nowrap}
.b-approved{background:rgba(34,197,94,.15);color:var(--green)}.b-published{background:rgba(59,130,246,.15);color:var(--blue)}
.b-embargoed{background:rgba(239,68,68,.15);color:var(--red)}.b-draft{background:rgba(136,132,168,.15);color:var(--muted)}.b-archived{background:rgba(136,132,168,.12);color:var(--muted)}
.chip{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px;background:rgba(255,255,255,.06);color:#bcb8d6;white-space:nowrap}
.tier{display:inline-block;font-size:9.5px;font-weight:800;padding:2px 6px;border-radius:5px;margin-left:5px}
.t1{background:rgba(239,68,68,.18);color:#ff8a80}.t2{background:rgba(245,158,11,.18);color:#ffcf6b}.t3{background:rgba(136,132,168,.16);color:var(--muted)}
.tent{border-left:3px solid var(--gold)}
.reg{color:var(--green);font-size:10.5px;font-weight:700;margin-left:6px}
.embargo{border:1px solid rgba(239,68,68,.35);background:rgba(239,68,68,.07)}
.lock{color:var(--red);font-weight:800}
.note{font-size:11.5px;color:var(--muted);margin-top:8px}
/* assistant */
.asst{background:linear-gradient(135deg,#15112b,#1a1535);border:1px solid rgba(245,200,66,.25);border-radius:14px;padding:16px 18px;margin-bottom:6px}
.asst .ah{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.asst .ah .d{width:9px;height:9px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold)}
.asst .ah h3{font-size:14px}.asst .ah .pillc{margin-left:auto;font-size:10px;font-weight:700;color:var(--gold);background:rgba(245,200,66,.12);border:1px solid rgba(245,200,66,.3);padding:3px 9px;border-radius:12px}
.exrow{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}
.ex{font-size:11.5px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:#cfc9e8;border-radius:16px;padding:6px 12px;cursor:pointer}
.ex:hover{border-color:var(--gold);color:var(--gold)}
.thread{display:flex;flex-direction:column;gap:9px;max-height:340px;overflow-y:auto;margin-bottom:10px}
.thread:empty{display:none}
.msg{max-width:90%;padding:9px 13px;border-radius:12px;font-size:12.5px;line-height:1.5}
.msg.u{align-self:flex-end;background:var(--gold);color:#000;font-weight:600;border-bottom-right-radius:4px}
.msg.b{align-self:flex-start;background:rgba(255,255,255,.06);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg.b a.act{color:var(--gold);font-weight:700;cursor:pointer;text-decoration:underline}
.msg.b table{margin-top:6px}.msg.b td{padding:4px 8px;font-size:11.5px}.msg.b .sub{font-size:10.5px}
.inrow{display:flex;gap:8px}
.inrow input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:10px 13px;font-size:12.5px;outline:none}
.inrow input:focus{border-color:var(--gold)}
.inrow button{background:var(--gold);color:#000;border:none;border-radius:9px;font-weight:700;padding:0 18px;cursor:pointer}
/* overlay/modal */
.ov{position:fixed;inset:0;background:rgba(4,3,10,.72);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:30px 16px;overflow-y:auto;backdrop-filter:blur(3px)}
.ov.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:100%;max-width:520px;padding:20px 22px}
.modal h3{font-size:15px;margin-bottom:4px}.modal .ms{font-size:11.5px;color:var(--muted);margin-bottom:14px}
.fld{margin-bottom:11px}.fld label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:600}
.fld input,.fld select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 11px;font-size:12.5px;outline:none}
.fld input:focus,.fld select:focus{border-color:var(--gold)}
.mbtns{display:flex;gap:9px;margin-top:16px}
.mbtns button{flex:1;border:none;border-radius:9px;padding:10px;font-weight:700;font-size:12.5px;cursor:pointer}
.mbtns .go{background:var(--gold);color:#000}.mbtns .no{background:rgba(255,255,255,.07);color:var(--muted)}
.demo-tag{font-size:10px;color:var(--amber);background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);padding:2px 8px;border-radius:10px;font-weight:700}
/* report sheet */
.rwrap{background:#fff;color:#1a1a1a;width:100%;max-width:760px;border-radius:8px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.rtoolbar{display:flex;gap:8px;align-items:center;padding:11px 16px;background:#f1f3f7;border-bottom:1px solid #dfe3ea}
.rtoolbar .rt-title{font-size:12px;font-weight:700;color:#33405a;flex:1}
.rtoolbar button{border:none;border-radius:7px;padding:7px 13px;font-size:11.5px;font-weight:700;cursor:pointer}
.rtoolbar .print{background:#0B1C3F;color:#fff}.rtoolbar .close{background:#e3e7ee;color:#55606e}
.sheet{padding:34px 40px 44px;font-family:Calibri,'Segoe UI',sans-serif}
.sheet .hd{display:flex;align-items:center;gap:10px;border-bottom:3px solid #C8A24B;padding-bottom:10px;margin-bottom:16px}
.sheet .hd .bdg{background:#0B1C3F;color:#fff;font-weight:900;font-size:11px;padding:3px 7px;border-radius:4px}
.sheet .hd .ti{font-size:19px;font-weight:800;color:#0B1C3F}
.sheet .hd .dt{margin-left:auto;font-size:11px;color:#7a8398}
.sheet h4{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:#8a93a8;margin:18px 0 7px;border-bottom:1px solid #e7eaf0;padding-bottom:3px}
.sheet p{font-size:13px;line-height:1.55;margin-bottom:6px}
.sheet .meta{display:grid;grid-template-columns:repeat(2,1fr);gap:5px 22px;margin-bottom:6px}
.sheet .meta div{font-size:12.5px}.sheet .meta b{color:#5a6party}
.sheet table{width:100%;border-collapse:collapse;margin:4px 0 8px}
.sheet th{background:#f3f5f9;color:#48536b;font-size:10px;text-transform:uppercase;letter-spacing:.5px;text-align:left;padding:6px 9px;border:1px solid #e3e7ee}
.sheet td{font-size:12px;padding:6px 9px;border:1px solid #e7eaf0;color:#26303f;vertical-align:top}
.sheet .rfoot{margin-top:22px;border-top:1px solid #e3e7ee;padding-top:8px;font-size:10.5px;color:#9aa3b5}
.sheet .emb{color:#b3261e;font-weight:700}
.footer{margin-top:26px;font-size:11px;color:var(--muted);border-top:1px solid var(--border);padding-top:12px;line-height:1.6}
@media print{
 body{background:#fff}
 .topbar,.sidebar,.rtoolbar,.ov.open>*:not(.rwrap){display:none!important}
 .main{display:none!important}
 .ov{position:static!important;display:block!important;background:#fff;padding:0;backdrop-filter:none}
 .rwrap{max-width:100%;box-shadow:none;border-radius:0}
 .sheet{padding:0}
}
</style></head>

function findTitle(q){q=q.toLowerCase();let best=null;
 DATA.reg.forEach(r=>{const t=r.title.toLowerCase();const key=norm(r.title);
  if(q.includes(t)||q.includes(key)){if(!best||key.length>norm(best.title).length)best=r;}});

 if(/tour\s*report/.test(ql)){const tr=DATA.tour.find(t=>title&&t.title===title.title)||DATA.tour[0]; return {report:["tour",tr.event]};}
 if(/embargo|held/.test(ql) && /report/.test(ql)) return {report:["embargo"]};
 if(/calendar/.test(ql) && /report|export|print/.test(ql)) return {report:["calendar"]};
 if(/^\s*(help|what can you|commands)/.test(ql)) return {html:"I can answer questions about the <b>slate, calendar, press breaks, tours, talent and source docs</b>, and generate printable <b>reports</b>. Try: \"what's breaking next 30 days\", \"which items are embargoed\", \"one-sheet for Moana\", \"draft the weekly digest\", \"show docs for Mandalorian\", \"tours\", \"how many titles\"."};

 if(/embargo|held|gate/.test(ql)){const rows=d.gated.map(b=>[`<b>${esc(b.headline)}</b>`,`held until ${b.embargo?esc(fmtDT(b.embargo)):'TBD'}`]);

 if(/tentpole/.test(ql)){const list=d.upTent.filter(c=>inWin(c.start,days));const rows=list.slice(0,12).map(c=>[fmtS(c.start),`<b>${esc(c.moment)}</b>`,esc(c.fq)]);

 if(/break|press|trailer|announce/.test(ql)){let list;if(days){list=DATA.brk.filter(b=>inWin(b.date,days)&&!d.gated.includes(b));}else{list=d.cleared.slice().sort((a,b)=>new Date(b.date)-new Date(a.date));}

  if(d.gated.length)h+=`<div class="sub" style="margin-top:5px">+ ${d.gated.length} embargoed (held, owners only).</div>`;return {html:h};}
 // tours
 if(/tour|junket|premiere/.test(ql)){const rows=DATA.tour.map(t=>[`<b>${esc(t.event)}</b>`,`${fmtS(t.start)}–${fmtS(t.end)}`,esc(t.status)]);
  return {html:`${DATA.tour.length} tour(s):${miniTable(null,rows)}<a class="act" data-r="tour:${esc(DATA.tour[0].event)}">Open tour report &rarr;</a>`};}
 // docs
 if(/doc|file|grid|aag|rooming|transfer|scheduling|concept/.test(ql)){let list=DATA.doc;if(title)list=DATA.doc.filter(x=>x.title===title.title);
  const rows=list.slice(0,14).map(x=>[`<b>${esc(x.document)}</b>`,esc(x.docType)]);
  return {html:`<b>${list.length}</b> source doc(s)${title?` for ${esc(title.title)}`:''}:${miniTable(null,rows)}`};}
 // calendar / upcoming
 if(/calendar|coming up|what'?s next|upcoming|slate/.test(ql) && !title){const list=d.upCal.filter(c=>inWin(c.start,days));const rows=list.slice(0,14).map(c=>[fmtS(c.start),`${c.type==='Tentpole'?'★ ':''}${esc(c.moment)}`,esc(c.type)]);
  return {html:`<b>${list.length}</b> upcoming moment(s)${days?` in the next ${days} days`:''}:${miniTable(null,rows)}`};}
 // counts
 if(/how many|count|total|number of/.test(ql)){return {html:`Spine totals — Titles: <b>${DATA.reg.length}</b> · Calendar moments: <b>${DATA.cal.length}</b> · Press breaks: <b>${DATA.brk.length}</b> (${d.gated.length} held) · Tours: <b>${DATA.tour.length}</b> · Talent: <b>${DATA.tal.length}</b> · Source docs: <b>${DATA.doc.length}</b>.`};}
 // title summary
 if(title){const br=DATA.brk.filter(b=>b.title===title.title),tr=DATA.tour.filter(t=>t.title===title.title),dc=DATA.doc.filter(x=>x.title===title.title);
  return {html:`<b>${esc(title.title)}</b> — ${esc(title.segment)} / ${esc(title.label)} · ${esc(title.type)} · release ${fmtD(title.release)} · ${esc(title.status)}.<br>${br.length} press break(s), ${tr.length} tour(s), ${dc.length} source doc(s).<br><a class="act" data-r="title:${esc(title.title)}">Open one-sheet &rarr;</a>`};}
 return {html:"I didn't catch that. I can answer about the slate, calendar, press breaks, tours, talent and docs, or build a report. Type <b>help</b> for examples."};
}
function wireChat(){
 const inp=document.getElementById("chatIn"),send=document.getElementById("chatSend"),th=document.getElementById("thread");
 document.querySelectorAll(".ex").forEach(e=>e.onclick=()=>{inp.value=e.textContent;go();});
 function add(role,html){const m=document.createElement("div");m.className="msg "+role;m.innerHTML=html;th.appendChild(m);
  m.querySelectorAll("a.act").forEach(a=>a.onclick=()=>{const r=a.getAttribute("data-r");if(r.startsWith("title:"))openReport("title",r.slice(6));else if(r.startsWith("tour:"))openReport("tour",r.slice(5));else openReport(r);});
  th.scrollTop=th.scrollHeight;}
 function go(){const q=inp.value.trim();if(!q)return;add("u",esc(q));inp.value="";
  const res=answer(q);
  if(res.report){openReport.apply(null,res.report);add("b","Opening the "+esc(res.report[0])+" report…");}
  else add("b",res.html);}
 send.onclick=go;inp.addEventListener("keydown",e=>{if(e.key==="Enter")go();});
}

/* ---------- reports ---------- */
function shHead(title){return `<div class="hd"><span class="bdg">PGS</span><span class="ti">${esc(title)}</span><span class="dt">${new Date().toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})}</span></div>`;}
function shFoot(){return `<div class="rfoot">Generated from the PGS2 spine — snapshot ${DATA.asof}. Publicity Global System · Confidential.</div>`;}
function rtab(head,rows){return `<table><thead><tr>${head.map(h=>`<th>${h}</th>`).join("")}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("")}</tbody></table>`;}
function openReport(type,arg){
 const d=derive(); let title="Report", html="";
 if(type==="title"){const r=DATA.reg.find(x=>x.title===arg)||DATA.reg[0];title="Title One-Sheet";
  const br=DATA.brk.filter(b=>b.title===r.title),tr=DATA.tour.filter(t=>t.title===r.title),dc=DATA.doc.filter(x=>x.title===r.title),cl=calForTitle(r.title);
  html=shHead(r.title)+`<div class="meta"><div><b>Segment:</b> ${esc(r.segment)}</div><div><b>Studio / Label:</b> ${esc(r.label)}</div><div><b>Type:</b> ${esc(r.type)}</div><div><b>Release:</b> ${fmtD(r.release)}</div><div><b>Status:</b> ${esc(r.status)}</div><div><b>Owner:</b> ${esc(r.owner)}</div></div>`;
  html+=`<h4>Press Breaks (${br.length})</h4>`+(br.length?rtab(["Headline","Type","Date","Status"],br.map(b=>[esc(b.headline)+(b.status==='Embargoed'?' <span class="emb">[EMBARGOED]</span>':''),esc(b.type),fmtD(b.date),esc(b.status)])):"<p>None.</p>");
  html+=`<h4>Tours &amp; Junkets (${tr.length})</h4>`+(tr.length?rtab(["Event","Dates","Location","Status"],tr.map(t=>[esc(t.event),`${fmtD(t.start)} – ${fmtD(t.end)}`,esc(t.location),esc(t.status)])):"<p>None.</p>");
  html+=`<h4>Source Documents (${dc.length})</h4>`+(dc.length?rtab(["Document","Type","Library"],dc.map(x=>[esc(x.document),esc(x.docType),esc(x.library)])):"<p>None.</p>");
  if(cl.length)html+=`<h4>Calendar</h4>`+rtab(["Moment","Date","Type / Tier"],cl.map(c=>[esc(c.moment),fmtD(c.start),esc(c.type)+(c.tier?` · T${esc(c.tier)}`:"")]));
  html+=shFoot();
 } else if(type==="digest"){title="Weekly Publicity Digest";
  const tent=d.upTent.filter(c=>inWin(c.start,30)),brkUp=DATA.brk.filter(b=>!d.gated.includes(b)).sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,6);
  html=shHead("Weekly Publicity Digest")+`<p>Studios-first publicity snapshot for the week of ${new Date().toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})}.</p>`;
  html+=`<h4>Upcoming Tentpoles — next 30 days (${tent.length})</h4>`+(tent.length?rtab(["Title","Date","Tier"],tent.map(c=>[esc(c.moment),fmtD(c.start),c.tier?`T${esc(c.tier)}`:"—"])):"<p>None in window.</p>");
  html+=`<h4>Recent &amp; Cleared Press Breaks</h4>`+rtab(["Headline","Title","Date","Status"],brkUp.map(b=>[esc(b.headline),esc(b.title),fmtD(b.date),esc(b.status)]));
  html+=`<h4>Active &amp; Upcoming Tours</h4>`+rtab(["Event","Dates","Status"],DATA.tour.map(t=>[esc(t.event),`${fmtD(t.start)} – ${fmtD(t.end)}`,esc(t.status)]));
  html+=`<h4 class="emb">Embargo Watch — owners only (${d.gated.length})</h4>`+(d.gated.length?rtab(["Headline","Title","Held until"],d.gated.map(b=>[esc(b.headline),esc(b.title),b.embargo?fmtDT(b.embargo):"TBD"])):"<p>Nothing held.</p>");
  html+=shFoot();
 } else if(type==="tour"){const t=DATA.tour.find(x=>x.event===arg)||DATA.tour[0];title="Tour Report";
  const dc=DATA.doc.filter(x=>x.title===t.title&&(x.library==="Schedules & Run-of-Show"||x.library==="Travel & Logistics"));
  html=shHead(t.event)+`<div class="meta"><div><b>Type:</b> ${esc(t.type)}</div><div><b>Title:</b> ${esc(t.title)}</div><div><b>Dates:</b> ${fmtD(t.start)} – ${fmtD(t.end)}</div><div><b>Location:</b> ${esc(t.location)}</div><div><b>Region:</b> ${esc(t.region)}</div><div><b>Status:</b> ${esc(t.status)}</div></div>`;
  if(t.talent)html+=`<h4>Talent</h4><p>${esc(t.talent)}</p>`;
  html+=`<h4>Related Documents (${dc.length})</h4>`+(dc.length?rtab(["Document","Type","Library"],dc.map(x=>[esc(x.document),esc(x.docType),esc(x.library)])):"<p>None linked yet.</p>");
  html+=shFoot();
 } else if(type==="embargo"){title="Embargo Watch";
  html=shHead("Embargo Watch")+`<p class="emb">Owners-only. These items are held from all outputs until their lift time.</p>`+
   (d.gated.length?rtab(["Headline","Title","Region","Held until"],d.gated.map(b=>[esc(b.headline),esc(b.title),esc(b.region),b.embargo?fmtDT(b.embargo):"TBD"])):"<p>Nothing currently held.</p>")+shFoot();
 } else if(type==="calendar"){title="Marketing Calendar — Upcoming";
  const list=d.upCal.filter(c=>inWin(c.start,90));const byFQ={};list.forEach(c=>{(byFQ[c.fq]=byFQ[c.fq]||[]).push(c);});
  html=shHead("Marketing Calendar — next 90 days");
  Object.keys(byFQ).forEach(fq=>{html+=`<h4>${esc(fq)}</h4>`+rtab(["Date","Moment","Type / Tier"],byFQ[fq].map(c=>[c.end?`${fmtS(c.start)}–${fmtS(c.end)}`:fmtD(c.start),esc(c.moment)+(c.reg?' ●':''),esc(c.type)+(c.tier?` · T${esc(c.tier)}`:"")]));});
  html+=shFoot();
 }
 document.getElementById("rtTitle").textContent=title;
 document.getElementById("rSheet").innerHTML=html;
 document.getElementById("reportOv").classList.add("open");
}

/* ---------- reports menu + new record ---------- */

 const titleOpts=DATA.reg.map(r=>`<option>${esc(r.title)}</option>`).join("");
 const tourOpts=DATA.tour.map(t=>`<option>${esc(t.event)}</option>`).join("");

 document.querySelectorAll("#modalBox [data-r]").forEach(b=>b.onclick=()=>{ov.classList.remove("open");openReport(b.getAttribute("data-r"));});

const ADD={
 "Title":{list:"reg",f:[["title","Title / Project"],["segment","Segment",["Studios","TV & Streaming","ESPN","Experiences","Consumer Products","Enterprise"]],["label","Studio / Label",["Marvel Studios","Pixar","Lucasfilm","20th Century Studios","Walt Disney Pictures","Searchlight","Disney+ Originals","Other"]],["type","Type",["Theatrical","Streaming Film","Series","Event","Other"]],["release","Release (YYYY-MM-DD)"],["status","Status",["Draft","Approved","Embargoed","Published","Archived"]],["owner","Owner / Publicist"]]},
 "Press Break":{list:"brk",f:[["headline","Headline / Break"],["type","Break Type",["Announcement","Trailer / Teaser","First Look","Casting","Review Embargo Lift","Feature / Interview","Other"]],["date","Break Date (YYYY-MM-DD)"],["region","Region",["Domestic","Global","EMEA","APAC","LATAM"]],["status","Status",["Draft","Approved","Embargoed","Published","Archived"]],["title","Title"],["notes","Notes"]]},
 "Tour / Junket":{list:"tour",f:[["event","Event"],["type","Event Type",["Junket","Premiere","Press Tour","FYC","Fan Event","Other"]],["start","Start (YYYY-MM-DD)"],["end","End (YYYY-MM-DD)"],["location","Location"],["region","Region",["Domestic","Global","EMEA","APAC","LATAM"]],["status","Status",["Draft","Approved","Embargoed","Published","Archived"]],["title","Title"],["talent","Talent (comma-sep)"]]},
 "Talent":{list:"tal",f:[["name","Name"],["role","Role",["Talent","Filmmaker","Producer","Executive","Other"]],["approval","Approval",["Pending","Approved","Declined","Hold"]],["titles","Title(s)"]]},
 "Contact":{list:"con",f:[["outlet","Outlet"],["contact","Contact Name"],["beat","Beat",["Film","TV / Streaming","Trade","Lifestyle","Entertainment","Other"]],["region","Region",["Domestic","Global","EMEA","APAC","LATAM"]]]},
};
function openNew(){
 const types=Object.keys(ADD);
 function form(tp){const cfg=ADD[tp];return cfg.f.map(([k,lab,opts])=>`<div class="fld"><label>${esc(lab)}</label>`+(opts?`<select data-k="${k}"><option value=""></option>${opts.map(o=>`<option>${esc(o)}</option>`).join("")}</select>`:`<input data-k="${k}">`)+`</div>`).join("");}
 function render(tp){document.getElementById("modalBox").innerHTML=`<h3>New record <span class="demo-tag">DEMO · saved to this browser only</span></h3><div class="ms">Add a record to test the flow. This updates the demo in your session; it does not write to Airtable.</div>
   <div class="fld"><label>Record type</label><select id="addType">${types.map(t=>`<option ${t===tp?'selected':''}>${esc(t)}</option>`).join("")}</select></div>
   <div id="addFields">${form(tp)}</div>
   <div class="mbtns"><button class="go" id="addGo">Add record</button><button class="no" id="addNo">Cancel</button></div>`;
  document.getElementById("addType").onchange=e=>{render(e.target.value);};
  document.getElementById("addNo").onclick=()=>document.getElementById("modalOv").classList.remove("open");
  document.getElementById("addGo").onclick=()=>{const cfg=ADD[document.getElementById("addType").value];const obj={};
   document.querySelectorAll("#addFields [data-k]").forEach(el=>obj[el.getAttribute("data-k")]=el.value.trim());
   if(!Object.values(obj).some(v=>v)){return;}
   DATA[cfg.list].unshift(obj);DATA.counts[cfg.list]=DATA[cfg.list].length;
   document.getElementById("modalOv").classList.remove("open");renderMain();
   toast("Added to "+document.getElementById("addType")?.value);};
 }
 render("Press Break");
 document.getElementById("modalOv").classList.add("open");
}
function toast(msg){const t=document.createElement("div");t.textContent="✓ "+msg+" (demo — not saved)";t.style.cssText="position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#0B1C3F;color:#fff;border:1px solid var(--gold);padding:11px 18px;border-radius:10px;font-size:12.5px;z-index:300;box-shadow:0 8px 30px rgba(0,0,0,.5)";document.body.appendChild(t);setTimeout(()=>t.remove(),3200);}

document.getElementById("rClose").onclick=()=>document.getElementById("reportOv").classList.remove("open");

document.querySelectorAll(".nav").forEach(n=>n.onclick=()=>{document.querySelectorAll(".nav").forEach(x=>x.classList.remove("active"));n.classList.add("active");
 const el=document.querySelector(n.getAttribute("data-t"));if(el)document.getElementById("main").scrollTo({top:Math.max(0,el.offsetTop-70),behavior:"smooth"});});
